name: Update Leagues

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create leagues directory
        run: mkdir -p data/leagues

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch leagues
        run: |
          LENGTH=$(jq '.leagues | length' data/leagues.json)

          for i in $(seq 0 $((LENGTH - 1)))
          do
            LEAGUE_ID=$(jq -r ".leagues[$i].id" data/leagues.json)
            SEASON=$(jq -r ".leagues[$i].season" data/leagues.json)

            echo "Fetching league: $LEAGUE_ID season: $SEASON"

            curl -s \
              -H "x-apisports-key: ${{ secrets.API_KEY_FOOTBALL }}" \
              "https://v3.football.api-sports.io/leagues?season=${SEASON}" \
              -o "data/leagues/${SEASON}.json"

          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/leagues

          git commit -m "update leagues" || echo "No changes"

          git push
