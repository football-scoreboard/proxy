name: Update League Fixtures

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create league-fixtures directory
        run: mkdir -p data/league-fixtures

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch league fixtures
        run: |
          LENGTH=$(jq '.leagues | length' data/leagues.json)

          for i in $(seq 0 $((LENGTH - 1)))
          do
            LEAGUE_ID=$(jq -r ".leagues[$i].id" data/leagues.json)
            SEASON=$(jq -r ".leagues[$i].season" data/leagues.json)

            echo "Fetching fixtures for league: $LEAGUE_ID season: $SEASON"

            curl -s \
              -H "x-apisports-key: ${{ secrets.API_KEY_FOOTBALL }}" \
              "https://v3.football.api-sports.io/fixtures?league=${LEAGUE_ID}&season=${SEASON}&timezone=Asia/Tehran" \
              -o "data/league-fixtures/${LEAGUE_ID}_${SEASON}.json"

          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/league-fixtures

          git commit -m "update league fixtures" || echo "No changes"

          git push
